<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Resume Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    color: #333;
}

.container {
    max-width: 600px;
    margin: 80px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
}

h1 {
    margin-bottom: 10px;
}

p {
    color: #666;
    margin-bottom: 25px;
}

input[type="file"] {
    margin: 15px 0;
}

button {
    background: #667eea;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #5a67d8;
    transform: scale(1.05);
}

.result {
    margin-top: 30px;
    padding: 20px;
    background: #f4f6ff;
    border-left: 5px solid #667eea;
    border-radius: 8px;
    text-align: left;
    white-space: pre-wrap;
}

.loader {
    display: none;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
    <h1>AI Resume Analyzer</h1>
    <p>Upload your resume and get instant AI feedback</p>

    <form method="POST" enctype="multipart/form-data" onsubmit="showLoader()">
        <input type="file" name="resume" placeholder="Choose a File" required><br>
        <button type="submit">Analyze Resume</button>
    </form>

    <div class="loader" id="loader">Analyzing...</div>

    {% if result %}
    <div class="result">
        {{ result }}
    </div>
    {% endif %}
     {% if message %}
    <div class="result">
        {{ message }}
    </div>
    {% endif %}
</div>

<script>
function showLoader() {
    document.getElementById("loader").style.display = "block";
}
</script>

</body>
</html>
